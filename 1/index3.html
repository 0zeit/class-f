<!DOCTYPE html> <!-- 문서 시작! -->
<!-- ====================================================== -->
<!--  디지털 명함 · 한 페이지 자기소개                            -->
<!--  HTML = 뼈대 / CSS = 외형 / JS = 기능                     -->
<!-- ====================================================== -->
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아아아 · 디지털 명함</title>
    <meta name="description" content="마케팅 매니저 아아아의 디지털 명함입니다. 데이터 기반 마케팅과 커피를 좋아합니다.">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

    <!-- ============ SEO : 구조화된 데이터 (Schema) ============ -->
    <!-- 사람 눈에는 안 보이지만, 구글은 이 태그를 읽고 "이름/직업/이메일이 각각 무엇인지" 정확히 이해합니다 -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "아아아",
        "jobTitle": "마케팅 매니저",
        "email": "aaaaaa@example.com",
        "telephone": "010-1234-5678",
        "address": {
            "@type": "PostalAddress",
            "addressLocality": "부산 대연동"
        }
    }
    </script>

    <!-- 이 페이지의 "경로"를 구글에게 알려주는 구조화된 데이터 (화면에 보이는 브레드크럼과 별개로, 검색결과용으로 한 번 더 명시) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "홈", "item": "https://example.com/" },
            { "@type": "ListItem", "position": 2, "name": "팀 소개", "item": "https://example.com/team" },
            { "@type": "ListItem", "position": 3, "name": "아아아", "item": "https://example.com/team/aaaaaa" }
        ]
    }
    </script>

    <!-- ============ CSS : 외장(디자인) ============ -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ============ HTML : 뼈대(구조) ============ -->
    <div class="page">

        <!-- SEO: 눈에 보이는 브레드크럼 (경로 표시) -->
        <!-- nav + aria-label로 "이건 탐색용 메뉴다"라고 명시합니다 -->
        <!-- aria-label 은 구글, 네이버 등 검색 엔진의 접근성 상향용 속성, aria-label은 속성의 이름표 -->
        <nav class="breadcrumb" aria-label="이동 경로">
            <a href="#">홈</a>
            <span>/</span>
            <a href="#">팀 소개</a>
            <span>/</span>
            <!-- aria-current="page": "지금 보고 있는 페이지가 바로 여기"라는 표시 -->
            <span aria-current="page">아아아</span>
        </nav>

        <!-- 이 페이지에서 가장 중요한 콘텐츠 영역이라는 뜻의 시맨틱 태그 -->
        <main class="card">
            <div class="top">
                <!-- 다크모드 전환 버튼 -->
                <button class="theme-toggle" id="themeBtn">🌙</button>
            </div>

            <!-- 이니셜: 여기에 본인 이름 첫 글자를 넣으세요 -->
            <div class="avatar">아</div>

            <div class="body">
                <!-- 시간대별로 JS가 이 문구를 바꿔줍니다 -->
                <p class="greeting" id="greeting">안녕하세요!</p>

                <!-- 여기에 본인 이름 -->
                <h1 class="name">아아아</h1>
                <!-- 여기에 직무 / 한 줄 소개 -->
                <p class="role">마케팅 매니저</p>

                <!-- 여기에 짧은 자기소개 -->
                <p class="bio">데이터로 이야기를 만드는 일을 좋아합니다.<br>요즘은 웹 프로그래밍을 배우는 중이에요.</p>

                <!-- 관심사 태그: 자유롭게 추가/삭제 -->
                <div class="tags">
                    <span class="tag">마케팅</span>
                    <span class="tag">데이터</span>
                    <span class="tag">커피</span>
                    <span class="tag">코딩 입문</span>
                </div>

                <!-- 연락처 -->
                <div class="contact">
                    <div><span class="label">이메일</span><span id="email">aaaaaa@example.com</span></div>
                    <div><span class="label">전화</span><span>010-1234-5678</span></div>
                    <div><span class="label">지역</span><span>부산 대연동</span></div>
                </div>

                <!-- 이 버튼을 누르면 JS가 동작합니다 -->
                <button class="btn" id="copyBtn">이메일 주소 복사</button>
            </div>
        </main>

    </div>

    <script src="scripts.js"></script>

</body>

</html>
