<!DOCTYPE html> <!-- 문서 시작! -->
<!-- ====================================================== -->
<!--  디지털 명함 · 한 페이지 자기소개                            -->
<!--  HTML = 뼈대 / CSS = 외형 / JS = 기능                     -->
<!-- ====================================================== -->
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아아아 · 디지털 명함</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

    <!-- ============ CSS : 외장(디자인) ============ -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ============ HTML : 뼈대(구조) ============ -->
    <div class="card">
        <div class="top"></div>

        <!-- 이니셜: 여기에 본인 이름 첫 글자를 넣으세요 -->
        <div class="avatar">아</div>

        <div class="body">
            <!-- 여기에 본인 이름 -->
            <h1 class="name">아아아</h1>
            <!-- 여기에 직무 / 한 줄 소개 -->
            <p class="role">마케팅 매니저</p>

            <!-- 여기에 짧은 자기소개 -->
            <p class="bio">데이터로 이야기를 만드는 일을 좋아합니다.<br>요즘은 웹 프로그래밍을 배우는 중이에요.</p>

            <!-- 관심사 태그: 자유롭게 추가/삭제 -->
            <div class="tags">
                <span class="tag">마케팅</span>
                <span class="tag">데이터</span>
                <span class="tag">커피</span>
                <span class="tag">코딩 입문</span>
            </div>

            <!-- 연락처 -->
            <div class="contact">
                <div>
                    <span class="label">이메일</span>
                    <span id="email">aaa@example.com</span>
                </div>
                <div>
                    <span class="label">전화</span>
                    <span>010-1234-5678</span>
                </div>
                <div>
                    <span class="label">지역</span>
                    <span>부산 대연동</span>
                </div>
            </div>

            <!-- 이 버튼을 누르면 JS가 동작합니다 -->
            <button class="btn" id="copyBtn">이메일 주소 복사</button>
        </div>
    </div>

    <!-- ============ JS : 기능(움직임) ============ -->
    <script>
        // 1. 화면에서 버튼과 이메일을 가져옵니다
        const button = document.getElementById('copyBtn');
        const email = document.getElementById('email').textContent;

        // 2. 버튼을 "클릭했을 때" 실행할 동작을 정합니다
        button.addEventListener('click', function () {
            // 이메일 주소를 클립보드에 복사
            navigator.clipboard.writeText(email);

            // 버튼 글자를 잠깐 바꿔서 "복사됐다"고 알려줍니다
            button.textContent = '복사 완료! ✅';

            // 1.5초 뒤 원래 글자로 되돌리기
            setTimeout(function () {
                button.textContent = '이메일 주소 복사';
            }, 1500);
        });
    </script>

    <!--
    <script src="scripts.js"></script>
    -->

</body>

</html>
