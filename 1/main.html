<!DOCTYPE html>
<!-- ====================================================== -->
<!--  디지털 명함 · 한 페이지 자기소개                        -->
<!--  HTML = 뼈대 / CSS = 외형 / JS = 행동                    -->
<!--  ※ "여기에..." 라고 적힌 부분을 본인 정보로 바꿔보세요!   -->
<!-- ====================================================== -->
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아아아 · 디지털 명함</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    
    <!-- ============ CSS : 외장(디자인) ============ -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ============ HTML : 뼈대(구조) ============ -->
    <div class="card">
        <div class="top"></div>

        <!-- 이니셜: 여기에 본인 이름 첫 글자를 넣으세요 -->
        <div class="avatar">아</div>

        <div class="body">
            <!-- 여기에 본인 이름 -->
            <h1 class="name">아아아</h1>
            <!-- 여기에 직무 / 한 줄 소개 -->
            <p class="role">마케팅 매니저</p>

            <!-- 여기에 짧은 자기소개 -->
            <p class="bio">데이터로 이야기를 만드는 일을 좋아합니다.<br>요즘은 웹 프로그래밍을 배우는 중이에요.</p>

            <!-- 관심사 태그: 자유롭게 추가/삭제 -->
            <div class="tags">
                <span class="tag">마케팅</span>
                <span class="tag">데이터</span>
                <span class="tag">커피</span>
                <span class="tag">코딩 입문</span>
            </div>

            <!-- 연락처 -->
            <div class="contact">
                <div>
                    <span class="label">이메일</span>
                    <span id="email">aaa@example.com</span>
                </div>
                <div>
                    <span class="label">전화</span>
                    <span>010-1234-5678</span>
                </div>
                <div>
                    <span class="label">지역</span>
                    <span>부산 대연동</span>
                </div>
            </div>

            <!-- 이 버튼을 누르면 JS가 동작합니다 -->
            <button class="btn" id="copyBtn">이메일 주소 복사</button>
        </div>
    </div>

    <!-- ============ JS : 행동(움직임) ============ -->
    <script src="scripts.js"></script>

</body>

</html>
