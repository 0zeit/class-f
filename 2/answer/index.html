<!DOCTYPE html>
<html lang="ko"> <!-- FIX #3: lang 속성 추가 -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FIX #1: 페이지 내용을 설명하는 제목으로 변경 -->
    <title>아아아 · 디지털 명함</title>

    <!-- FIX #2: meta description 추가 -->
    <meta name="description" content="개발자 아아아의 디지털 명함입니다. 서버와 데이터베이스를 다룹니다.">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- FIX #9: div 대신 시맨틱 태그(main) 사용 -->
    <main class="card">
        <div class="top">
            <!-- FIX #10: 아이콘만 있는 버튼에 aria-label 추가 -->
            <button class="theme-toggle" id="themeBtn" aria-label="다크모드 전환">🌙</button>
        </div>

        <!-- FIX #5: alt 속성 추가 (이 이미지가 무엇인지 설명) -->
        <img class="avatar" src="https://placehold.co/96x96/16a34a/ffffff" alt="아아아 프로필 사진">

        <div class="body">
            <!-- FIX #4: 이름을 h1으로, 직무는 일반 텍스트로. 페이지에서 가장 중요한 제목(이름)만 h1이어야 함 -->
            <h1 class="name">아아아</h1>
            <p class="role">개발자</p>

            <p class="bio">회사 서버와 데이터베이스를 관리하고 있습니다. 새로운 기술을 배우는 것을 좋아합니다.</p>

            <div class="tags">
                <span class="tag">백엔드</span>
                <span class="tag">서버</span>
                <span class="tag">데이터베이스</span>
            </div>

            <div class="contact">
                <div><span class="label">이메일</span><span id="email">aaaaaa@example.com</span></div>
                <div><span class="label">전화</span><span>010-1234-5678</span></div>
                <!-- FIX #7: 중복됐던 id="email" 제거 (id는 페이지에서 단 하나만 써야 함) -->
                <div><span class="label">지역</span><span>부산 대연동</span></div>
            </div>

            <!-- FIX #8: JS 코드와 짝이 맞도록 id를 copyBtn으로 통일 -->
            <button class="btn" id="copyBtn">이메일 주소 복사</button>
        </div>
    </main>

    <script src="scripts.js"></script>

</body>

</html>
