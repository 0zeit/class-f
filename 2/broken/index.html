<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="card">
        <div class="top">
            <button class="theme-toggle" id="themeBtn">🌙</button>
        </div>

        <img class="avatar" src="https://placehold.co/96x96/16a34a/ffffff">

        <div class="body">
            <div class="name">아아아</div>
            <h1 class="role">개발자</h1>

            <p class="bio">회사 서버와 데이터베이스를 관리하고 있습니다. 새로운 기술을 배우는 것을 좋아합니다.</p>

            <div class="tags">
                <span class="tag">백엔드</span>
                <span class="tag">서버</span>
                <span class="tag">데이터베이스</span>
            </div>

            <div class="contact">
                <div><span class="label">이메일</span><span id="email">aaaaaa@example.com</span></div>
                <div><span class="label">전화</span><span>010-1234-5678</span></div>
                <div><span class="label">지역</span><span id="email">부산 대연동</span></div>
            </div>

            <button class="btn" id="copyEmailBtn">이메일 주소 복사</button>
        </div>
    </div>

    <script src="scripts.js"></script>

</body>

</html>
